<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Demo</title>
    <style>
        /* Basic page styling */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7f6;
        }

        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* The Button Style */
        .my-button {
            background-color: #6200ee;
            color: white;
            padding: 12px 28px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        /* Hover effect */
        .my-button:hover {
            background-color: #3700b3;
            transform: scale(1.05);
        }

        /* Active/Click effect */
        .my-button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome!</h1>
        <p>Press the button below to trigger an action.</p>
        
        <button type="button" class="my-button" onclick="handleClick()">
            Click Me
        </button>
    </div>

    <script>
        function handleClick() {
            alert("Button clicked! Have a great day.");
        }
    </script>

</body>
</html>
